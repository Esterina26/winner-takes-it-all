<!DOCTYPE html>
<html>
<head>
  <title>Pesca 1 carta</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
   img {
  width: 280px;
  max-width: 42vw;
  margin: 15px;
  cursor: pointer;
  transition: all 0.4s ease;
}

img:hover {
  transform: scale(1.06);
}

.zoomed {
  width: 420px;
  max-width: 85vw;
  transform: scale(1.05);
}
  </style>
</head>

<body>

<h2>Scegli una carta</h2>
<div id="cards"></div>

</body>
</html>
<script>
const cards = [
  "carta1.png",
  "carta2.png",
  "carta3.png",
  "carta4.png",
  "carta5.png",
  "carta6.png",
  "carta7.png",
  "carta8.png",
  "carta9.png",
  "carta10.png",
  "carta11.png",
  "carta12.png",
  "carta13.png",
  "carta14.png",
  "carta15.png",
  "carta16.png",
  "carta17.png",
  "carta18.png",
  "carta19.png",
  "carta20.png",
  "carta21.png",
  "carta22.png",
  "carta23.png",
  "carta24.png",
  "carta25.png",
  "carta26.png",
  "carta27.png",
  "carta28.png",
  "carta29.png",
  "carta30.png",
  "carta31.png",
  "carta32.png",
  "carta33.png",
  "carta34.png",
  "carta35.png",
  "carta36.png"
];

function getRandomCards(array, num) {
  let shuffled = [...array].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, num);
}

let selected = getRandomCards(cards, 2);
let container = document.getElementById("cards");

selected.forEach(card => {
  let img = document.createElement("img");
  img.src = card;

  img.onclick = () => {
    container.innerHTML = "";
    img.classList.add("zoomed");
    container.appendChild(img);
  };

  container.appendChild(img);
});
</script>

</body>
</html>
