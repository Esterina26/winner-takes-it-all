<!DOCTYPE html>
<html>
<head>
  <title>Pesca 2 carte</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    img {
      width: 150px;
      margin: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h2>Scegli una carta</h2>
<div id="cards"></div>

<script>
const cards = [
  {img: "carta01.png", text: "Carta 1"},
  {img: "carta02.png", text: "Carta 2"},
  {img: "carta03.png", text: "Carta 3"},
  {img: "carta04.png", text: "Carta 4"},
  {img: "carta05.png", text: "Carta 5"},
  {img: "carta06.png", text: "Carta 6"},
  {img: "carta07.png", text: "Carta 7"},
  {img: "carta08.png", text: "Carta 8"},
  {img: "carta09.png", text: "Carta 9"},
  {img: "carta10.png", text: "Carta 10"},
  {img: "carta11.png", text: "Carta 11"},
  {img: "carta12.png", text: "Carta 12"},
  {img: "carta13.png", text: "Carta 13"},
  {img: "carta14.png", text: "Carta 14"},
  {img: "carta15.png", text: "Carta 15"},
  {img: "carta16.png", text: "Carta 16"},
  {img: "carta17.png", text: "Carta 17"},
  {img: "carta18.png", text: "Carta 18"},
  {img: "carta19.png", text: "Carta 19"},
  {img: "carta20.png", text: "Carta 20"},
  {img: "carta21.png", text: "Carta 21"},
  {img: "carta22.png", text: "Carta 22"},
  {img: "carta23.png", text: "Carta 23"},
  {img: "carta24.png", text: "Carta 24"},
  {img: "carta25.png", text: "Carta 25"},
  {img: "carta26.png", text: "Carta 26"},
  {img: "carta27.png", text: "Carta 27"},
  {img: "carta28.png", text: "Carta 28"},
  {img: "carta29.png", text: "Carta 29"},
  {img: "carta30.png", text: "Carta 30"},
  {img: "carta31.png", text: "Carta 31"},
  {img: "carta32.png", text: "Carta 32"},
  {img: "carta33.png", text: "Carta 33"},
  {img: "carta34.png", text: "Carta 34"},
  {img: "carta35.png", text: "Carta 35"},
  {img: "carta36.png", text: "Carta 36"}
];

function getRandomCards(array, num) {
  let shuffled = [...array].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, num);
}

let selected = getRandomCards(cards, 2);
let container = document.getElementById("cards");

selected.forEach(card => {
  let img = document.createElement("img");
  img.src = card;

  img.onclick = () => {
    alert("Hai scelto questa carta!");
  };

  container.appendChild(img);
});
</script>

</body>
</html>
