<!DOCTYPE html>
<html>
<head>
  <title>Pesca 1 carta</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rubik:wght@400;700;900&display=swap');

    body {
      margin: 0;
      min-height: 100vh;
      text-align: center;
      font-family: 'Rubik', sans-serif;
      color: white;
      overflow-x: hidden;

      background: radial-gradient(circle at 20% 20%, #7c3aed, transparent 30%),
                  radial-gradient(circle at 80% 10%, #06b6d4, transparent 25%),
                  radial-gradient(circle at 50% 90%, #ec4899, transparent 30%),
                  #070016;
      background-size: 200% 200%;
      animation: bgMove 10s ease-in-out infinite alternate;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle, rgba(255,255,255,0.22) 2px, transparent 3px);
      background-size: 55px 55px;
      animation: dotsMove 9s linear infinite;
      opacity: 0.45;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.09), transparent 40%, rgba(255,255,255,0.08));
      backdrop-filter: blur(1px);
      z-index: -1;
    }

    @keyframes bgMove {
      from { background-position: 0% 0%; }
      to { background-position: 100% 100%; }
    }

    @keyframes dotsMove {
      from { transform: translateY(0); }
      to { transform: translateY(55px); }
    }

    h2 {
      margin-top: 0;
      margin-bottom: 25px;
      font-family: 'Orbitron', sans-serif;
      font-size: 34px;
      letter-spacing: 1px;
      text-shadow: 0 0 18px #06b6d4, 0 0 30px #ec4899;
    }

    #cards {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    img {
      width: 300px;
      max-width: 42vw;
      cursor: pointer;
      transition: all 0.45s ease;
      border-radius: 22px;
      box-shadow: 0 0 28px rgba(6, 182, 212, 0.55),
                  0 0 45px rgba(236, 72, 153, 0.35);
    }

    img:hover {
      transform: translateY(-8px) scale(1.07);
      box-shadow: 0 0 35px rgba(6, 182, 212, 0.8),
                  0 0 60px rgba(236, 72, 153, 0.55);
    }

    .zoomed {
      width: 460px;
      max-width: 88vw;
      transform: scale(1.04);
    }

    #result {
      margin-top: 28px;
      font-family: 'Orbitron', sans-serif;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 15px #06b6d4, 0 0 25px #ec4899;
    }

    @media (max-width: 600px) {
      h2 {
        font-size: 26px;
        margin-bottom: 22px;
      }

      #cards {
        gap: 14px;
      }

      img {
        width: 43vw;
        max-width: 43vw;
      }

      .zoomed {
        width: 82vw;
        max-width: 82vw;
      }

      #result {
        font-size: 20px;
        margin-top: 24px;
      }
    }
  </style>
</head>

<body>

  <h2 id="title">Scegli una carta</h2>

  <div id="cards"></div>
  <div id="result"></div>

  <script>
    const cards = [
      "carta1.png",
      "carta2.png",
      "carta3.png",
      "carta4.png",
      "carta5.png",
      "carta6.png",
      "carta7.png",
      "carta8.png",
      "carta9.png",
      "carta10.png",
      "carta11.png",
      "carta12.png",
      "carta13.png",
      "carta14.png",
      "carta15.png",
      "carta16.png",
      "carta17.png",
      "carta18.png",
      "carta19.png",
      "carta20.png",
      "carta21.png",
      "carta22.png",
      "carta23.png",
      "carta24.png",
      "carta25.png",
      "carta26.png",
      "carta27.png",
      "carta28.png",
      "carta29.png",
      "carta30.png",
      "carta31.png",
      "carta32.png",
      "carta33.png",
      "carta34.png",
      "carta35.png",
      "carta36.png"
    ];

    function getRandomCards(array, num) {
      let shuffled = [...array].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, num);
    }

    let selected = getRandomCards(cards, 2);
    let container = document.getElementById("cards");
    let result = document.getElementById("result");
    let title = document.getElementById("title");

    selected.forEach(card => {
      let img = document.createElement("img");
      img.src = card;

      img.onclick = () => {
        title.style.display = "none";
        container.innerHTML = "";
        img.classList.add("zoomed");
        container.appendChild(img);
        result.innerText = "Hai scelto questa carta!";
      };

      container.appendChild(img);
    });
  </script>

</body>
</html>
