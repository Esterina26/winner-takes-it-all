<!DOCTYPE html>
<html>
<head>
  <title>Winner Takes It All</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rubik:wght@400;700;900&display=swap');

    body {
      margin: 0;
      min-height: 100vh;
      text-align: center;
      font-family: 'Rubik', sans-serif;
      color: white;
      overflow-x: hidden;
      background: radial-gradient(circle at 20% 20%, #7c3aed, transparent 30%),
                  radial-gradient(circle at 80% 10%, #06b6d4, transparent 25%),
                  radial-gradient(circle at 50% 90%, #ec4899, transparent 30%),
                  #070016;
      background-size: 200% 200%;
      animation: bgMove 10s ease-in-out infinite alternate;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.22) 2px, transparent 3px);
      background-size: 55px 55px;
      animation: dotsMove 9s linear infinite;
      opacity: 0.45;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.09), transparent 40%, rgba(255,255,255,0.08));
      backdrop-filter: blur(1px);
      z-index: -1;
    }

    @keyframes bgMove {
      from { background-position: 0% 0%; }
      to { background-position: 100% 100%; }
    }

    @keyframes dotsMove {
      from { transform: translateY(0); }
      to { transform: translateY(55px); }
    }

    .screen {
      width: 92%;
      max-width: 950px;
      padding: 25px 0;
    }

    h1, h2, h3 {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      text-shadow: 0 0 18px #06b6d4, 0 0 30px #ec4899;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 18px;
    }

    h2 {
      font-size: 30px;
      margin-bottom: 25px;
    }

    h3 {
      font-size: 20px;
      margin-top: 28px;
      margin-bottom: 15px;
    }

    input {
      width: 80%;
      max-width: 360px;
      padding: 16px;
      border-radius: 18px;
      border: none;
      font-size: 18px;
      text-align: center;
      outline: none;
      margin-bottom: 18px;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #06b6d4, #ec4899);
      box-shadow: 0 0 22px rgba(236, 72, 153, 0.55);
      margin: 8px;
    }

    button:hover {
      transform: scale(1.05);
    }

    #cards {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    img.card {
      width: 300px;
      max-width: 42vw;
      cursor: pointer;
      transition: all 0.45s ease;
      border-radius: 22px;
      box-shadow: 0 0 28px rgba(6, 182, 212, 0.55),
                  0 0 45px rgba(236, 72, 153, 0.35);
    }

    img.card:hover {
      transform: translateY(-8px) scale(1.07);
      box-shadow: 0 0 35px rgba(6, 182, 212, 0.8),
                  0 0 60px rgba(236, 72, 153, 0.55);
    }

    img.zoomed {
      width: 460px;
      max-width: 88vw;
      transform: scale(1.04);
    }

    #result {
      margin-top: 28px;
      font-family: 'Orbitron', sans-serif;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 15px #06b6d4, 0 0 25px #ec4899;
    }

    #info {
      margin-top: 18px;
      font-size: 17px;
      opacity: 0.95;
    }

    #chosenGallery {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    #chosenGallery img {
      width: 82px;
      border-radius: 10px;
      box-shadow: 0 0 14px rgba(255,255,255,0.35);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      body {
        justify-content: flex-start;
      }

      .screen {
        padding-top: 45px;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 24px;
      }

      img.card {
        width: 43vw;
        max-width: 43vw;
      }

      img.zoomed {
        width: 82vw;
        max-width: 82vw;
      }

      #result {
        font-size: 20px;
      }

      #chosenGallery img {
        width: 64px;
      }
    }
  </style>
</head>

<body>

  <div id="loginScreen" class="screen">
    <h1>Winner Takes It All</h1>
    <h2>Inserisci il tuo nome giocatore</h2>
    <input id="playerNameInput" type="text" placeholder="Il tuo nome">
    <br>
    <button onclick="startGame()">Entra nel gioco</button>
  </div>

  <div id="gameScreen" class="screen hidden">
    <h2 id="title">Scegli una carta</h2>

    <div id="cards"></div>
    <div id="result"></div>
    <div id="info"></div>

    <h3 id="galleryTitle">Le tue carte scelte</h3>
    <div id="chosenGallery"></div>

    <br>
    <button onclick="newTurn()">Nuovo turno</button>
    <button onclick="resetGame()">Reset partita</button>
  </div>

  <script>
    const cards = [
      "carta1.png", "carta2.png", "carta3.png", "carta4.png",
      "carta5.png", "carta6.png", "carta7.png", "carta8.png",
      "carta9.png", "carta10.png", "carta11.png", "carta12.png",
      "carta13.png", "carta14.png", "carta15.png", "carta16.png",
      "carta17.png", "carta18.png", "carta19.png", "carta20.png",
      "carta21.png", "carta22.png", "carta23.png", "carta24.png",
      "carta25.png", "carta26.png", "carta27.png", "carta28.png",
      "carta29.png", "carta30.png", "carta31.png", "carta32.png",
      "carta33.png", "carta34.png", "carta35.png", "carta36.png"
    ];

    let playerName = localStorage.getItem("playerName") || "";
    let chosenCards = JSON.parse(localStorage.getItem("chosenCards")) || [];

    const loginScreen = document.getElementById("loginScreen");
    const gameScreen = document.getElementById("gameScreen");
    const playerNameInput = document.getElementById("playerNameInput");
    const container = document.getElementById("cards");
    const result = document.getElementById("result");
    const info = document.getElementById("info");
    const title = document.getElementById("title");
    const chosenGallery = document.getElementById("chosenGallery");
    const galleryTitle = document.getElementById("galleryTitle");

    if (playerName) {
      showGame();
    }

    function startGame() {
      const name = playerNameInput.value.trim();

      if (name === "") {
        alert("Inserisci un nome giocatore!");
        return;
      }

      playerName = name;
      localStorage.setItem("playerName", playerName);
      showGame();
    }

    function showGame() {
      loginScreen.classList.add("hidden");
      gameScreen.classList.remove("hidden");
      newTurn();
    }

    function getAvailableCards() {
      return cards.filter(card => !chosenCards.includes(card));
    }

    function getRandomCards(array, num) {
      let shuffled = [...array].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, num);
    }

    function renderChosenGallery() {
      chosenGallery.innerHTML = "";

      if (chosenCards.length === 0) {
        galleryTitle.style.display = "none";
        return;
      }

      galleryTitle.style.display = "block";

      chosenCards.forEach(card => {
        let miniImg = document.createElement("img");
        miniImg.src = card;
        chosenGallery.appendChild(miniImg);
      });
    }

    function newTurn() {
      container.innerHTML = "";
      result.innerText = "";
      title.style.display = "block";
      title.innerText = "Scegli una carta";

      let availableCards = getAvailableCards();

      info.innerText = playerName + ", hai già scelto " + chosenCards.length + " carte su " + cards.length + ".";

      renderChosenGallery();

      if (availableCards.length === 0) {
        title.innerText = "Hai pescato tutte le carte!";
        return;
      }

      let selected = getRandomCards(availableCards, Math.min(2, availableCards.length));

      selected.forEach(card => {
        let img = document.createElement("img");
        img.src = card;
        img.classList.add("card");

        img.onclick = () => {
          if (!chosenCards.includes(card)) {
            chosenCards.push(card);
            localStorage.setItem("chosenCards", JSON.stringify(chosenCards));
          }

          title.style.display = "none";
          container.innerHTML = "";
          img.classList.add("zoomed");
          container.appendChild(img);

          result.innerText = "Hai scelto questa carta!";
          info.innerText = playerName + ", hai scelto " + chosenCards.length + " carte su " + cards.length + ".";

          renderChosenGallery();
        };

        container.appendChild(img);
      });
    }

    function resetGame() {
      localStorage.removeItem("playerName");
      localStorage.removeItem("chosenCards");
      location.reload();
    }
  </script>

</body>
</html>
